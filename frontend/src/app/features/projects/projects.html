<section class="Projects py-5 bg-black text-white min-vh-100">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-5">
      <h2 class="fw-bold display-6">All <span class="text-info">Projects</span></h2>
      <a routerLink="/" class="btn btn-outline-secondary rounded-pill px-4">
        <i class="bi bi-arrow-left me-2"></i>Back Home
      </a>
    </div>

    <div class="row g-4">
        @for (project of projects; track $index) {
        <div class="col-md-4" >
          <div class="card h-100 bg-dark text-white border-secondary shadow-sm" (click)="redirectToDetails(project.id)">
            <img [src]="project?.projectImage" class="card-img-top" style="height: 200px; object-fit: cover;">
            <div class="card-body">
              <h5 class="card-title text-info">{{ project?.title }}</h5>
              <p class="card-text opacity-75 small">{{ project?.description }}</p>
              <div class="project-tags d-flex flex-wrap gap2 mb-4">
                @for (skill of project.usedSkills; track skill) {
                    <span class="skill-tag">
                          {{skill}}
                    </span>
                }
              </div>
              <div class=" d-flex gap-2 ">
                <a [href]="project?.liveDemo" target="_blank" class="btn btn-sm btn-info fw-bold">Live Demo</a>
                <a [href]="project?.githubLink" target="_blank" class="btn btn-sm btn-2 fw-bold">Code</a>
              </div>
            </div>
          </div>
        </div>
        }
      </div>
  </div>
</section>
