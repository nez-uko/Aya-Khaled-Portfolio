<div class="dashboard-wrapper">
  <button class="btn btn-info d-md-none toggle-btn" (click)="isSidebarOpen = !isSidebarOpen">
    <i class="bi" [class.bi-list]="!isSidebarOpen" [class.bi-x-lg]="isSidebarOpen"></i>
  </button>

  <div class="row g-0 h-100">
    <div class="sidebar col-md-3 col-lg-2 bg-black border-end border-secondary" [class.open]="isSidebarOpen">
      <div class="p-3 d-flex flex-column h-100">
        <div class="text-center mb-4 pt-4 pt-md-0">
          <h4 class="fw-bold text-white mb-1">Aya <span class="text-info">Admin</span></h4>
          <p class="text-muted small">Control Panel</p>
        </div>

        <ul class="nav nav-pills flex-column mb-auto">
          @for (item of menuItems; track $index) {
          <li class="nav-item mb-2">
            <a class="nav-link text-white d-flex align-items-center"
               [routerLink]="item.path"
               routerLinkActive="active"
               (click)="isSidebarOpen = false">
              <i [class]="item.icon"></i>
              <span>{{ item.label }}</span>
            </a>
          </li>
          }
        </ul>

        <hr class="border-secondary" />
        <button class="btn btn-outline-danger w-100 rounded-pill py-2" (click)="auth.logout()">
          <i class="bi bi-box-arrow-right me-2"></i>Logout
        </button>
      </div>
    </div>

    <div class="main-content col-md-9 col-lg-10 bg-dark text-white">
      <div class="p-4">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>

  @if (isSidebarOpen) {
    <div class="sidebar-overlay d-md-none" (click)="isSidebarOpen = false"></div>
  }
</div>
