<section class="project-details py-5 bg-black text-white min-vh-100">
  <div class="container py-5">
    <div class="row g-5 align-items-center">
      <div class="col-lg-6">
        <div class="detail-img-wrapper rounded-4 overflow-hidden border border-secondary shadow-lg">
          <img [src]="project?.projectImage"  [alt]="project?.title" class="img-fluid w-100">
        </div>
      </div>

      <div class="col-lg-6">
        <div class="project-info-header mb-4">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a routerLink="/projects" class="text-info text-decoration-none">Projects</a></li>
              <li class="breadcrumb-item active text-white opacity-50">{{ project?.title }}</li>
            </ol>
          </nav>
          <h1 class="display-4 fw-bold mb-3">{{ project?.title }}</h1>
          <div class="h-line bg-info mb-4" style="width: 80px; height: 4px; border-radius: 2px;"></div>
        </div>

        <div class="project-body mb-5">
          <h5 class="text-info mb-3"><i class="bi bi-info-circle me-2"></i>About Project</h5>
          <p class="text-gray fs-5 lh-lg">{{ project?.description }}</p>
        </div>

        <div class="project-tags d-flex flex-wrap gap-2 mb-4">
                    @for (skill of project?.usedSkills; track $index) {
                      <span class="skill-tag">
                          {{skill}}
                    </span>
                    }
        </div>
        <div class="project-actions d-flex gap-3">
          <a [href]="project?.githubLink" target="_blank" class="btn btn-dark border-secondary rounded-pill px-4 py-2">
            <i class="bi bi-github me-2"></i>Source Code
          </a>
          <a [href]="project?.liveDemo" target="_blank" class="btn btn-info rounded-pill px-4 py-2 fw-bold">
            <i class="bi bi-rocket-takeoff me-2"></i>Live Demo
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
